name: Build

on:
  push:
    branches: [main]
    tags: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # 快速验证：PR 或 push 到 main 时只构建 aarch64
  check:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-apple-darwin
      - run: npm ci
      - run: npm run tauri build -- --target aarch64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: MaikNote-aarch64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  # 发布：tag 推送时构建双架构
  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: MaikNote-aarch64
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: MaikNote-x86_64
    runs-on: ${{ matrix.runner }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - run: npm ci
      - run: npm run tauri build -- --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

  # 合并双架构产物，创建 GitHub Release
  create-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Prepare Release Assets
        run: |
          mkdir -p release-assets update-artifacts
          cp MaikNote-aarch64/*.dmg              release-assets/   || true
          cp MaikNote-x86_64/*.dmg               release-assets/   || true
          cp MaikNote-aarch64/*.app.tar.gz       update-artifacts/ || true
          cp MaikNote-x86_64/*.app.tar.gz        update-artifacts/ || true
          cp MaikNote-aarch64/*.app.tar.gz.sig   update-artifacts/ || true
          cp MaikNote-x86_64/*.app.tar.gz.sig    update-artifacts/ || true
      - name: Generate latest.json
        run: node scripts/generate-latest-json.js "${{ github.ref_name }}"
      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release-assets/*.dmg \
            update-artifacts/*.app.tar.gz \
            update-artifacts/*.app.tar.gz.sig \
            latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
